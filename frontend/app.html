<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>错题本生成系统 - 智能工作台</title>

    <!-- 统一英文字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- MathJax -->
    <script>
      MathJax = {
        tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
        svg: { fontCache: 'global' }
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer" />

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <!-- 预加载界面专属原生 CSS -->
    <style>
      :root {
        --bg-color: #f8fafc; /* slate-50 */
        --text-main: #0f172a; /* slate-900 */
        --text-muted: #64748b; /* slate-500 */
        --brand-glow: rgba(59, 130, 246, 0.5); /* blue-500 */
      }
      
      html.dark {
        --bg-color: #05050A; /* 深邃黑 */
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --brand-glow: rgba(99, 102, 241, 0.6); /* indigo-500 */
      }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        transition: background-color 0.3s ease;
      }

      /* 预加载容器全屏居中 */
      .preloader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* 动态背景环境光 */
      .ambient-glow {
        position: absolute;
        width: 60vw;
        height: 60vw;
        background: var(--brand-glow);
        filter: blur(100px);
        opacity: 0.15;
        border-radius: 50%;
        animation: pulse-glow 4s ease-in-out infinite alternate;
        z-index: 0;
      }

      @keyframes pulse-glow {
        0% { transform: scale(0.8); opacity: 0.1; }
        100% { transform: scale(1.2); opacity: 0.25; }
      }

      /* 科技感核心加载圈 */
      .loader-core {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 30px;
        z-index: 10;
      }

      .loader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #3b82f6;
        border-right-color: #8b5cf6;
        animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      .loader-ring-inner {
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-bottom-color: #06b6d4;
        border-left-color: #3b82f6;
        animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite reverse;
      }

      .loader-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #3b82f6;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 15px rgba(59,130,246,0.8); }
      }

      /* 文字排版 */
      .loading-title {
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        z-index: 10;
      }

      .loading-subtitle {
        font-size: 0.875rem;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        z-index: 10;
      }
    </style>
    
    <!-- 防白屏：提前执行主题检测 -->
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body>
    <!-- Vue 挂载点 -->
    <div id="app">
      <!-- 极客风预加载器 (Vue 挂载后会自动销毁此处内容) -->
      <div class="preloader-container">
        <div class="ambient-glow"></div>
        
        <div class="loader-core">
          <div class="loader-ring"></div>
          <div class="loader-ring-inner"></div>
          <div class="loader-icon">
            <i class="fa-solid fa-microchip"></i>
          </div>
        </div>

        <div class="loading-title">正在唤醒工作台引擎</div>
        <div class="loading-subtitle">INITIALIZING NEURAL WORKSPACE...</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
