<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(129,115,223,0.95)"/>
      <stop offset="100%" stop-color="rgba(99,87,199,0.95)"/>
    </linearGradient>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="mask-grad" cx="50%" cy="50%" r="50%">
      <stop offset="30%" stop-color="white"/>
      <stop offset="80%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="grid-mask">
      <rect width="64" height="64" fill="url(#mask-grad)"/>
    </mask>
  </defs>
  <!-- 圆角背景 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- 顶部高光 -->
  <rect x="0" y="0" width="64" height="1" rx="14" fill="rgba(255,255,255,0.15)"/>
  <!-- 网格纹理 -->
  <rect width="64" height="64" rx="14" fill="url(#grid)" mask="url(#grid-mask)"/>
